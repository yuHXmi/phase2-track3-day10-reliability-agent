providers:
  - name: primary
    fail_rate: 0.25
    base_latency_ms: 180
    cost_per_1k_tokens: 0.01
  - name: backup
    fail_rate: 0.05
    base_latency_ms: 260
    cost_per_1k_tokens: 0.006
circuit_breaker:
  failure_threshold: 3
  reset_timeout_seconds: 2
  success_threshold: 1
cache:
  enabled: true
  backend: redis
  ttl_seconds: 300
  similarity_threshold: 0.92
  redis_url: "redis://127.0.0.1:6379/0"
load_test:
  requests: 100

scenarios:
  - name: primary_timeout_100
    description: "Primary provider fails 100% — all traffic should fallback"
    provider_overrides:
      primary: 1.0
  - name: primary_flaky_50
    description: "Primary provider fails 50% — circuit should oscillate"
    provider_overrides:
      primary: 0.5
  - name: all_healthy
    description: "Baseline — both providers healthy"
    provider_overrides: {}
